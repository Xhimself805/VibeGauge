; PlatformIO project for STM32F103 "Blue Pill" + SSD1306 0.96" I2C OLED.
; Open this folder in VSCode with the PlatformIO IDE extension installed,
; then use the PlatformIO toolbar: Build (check), Upload (arrow).
;
; Default upload is via an ST-Link v2 (4 wires: 3V3, GND, SWDIO=PA13, SWCLK=PA14).
; To flash over a USB-TTL serial adapter instead, comment the stlink lines and
; uncomment the serial bootloader block at the bottom.

[env:bluepill_f103c8]
platform = ststm32
board = bluepill_f103c8
framework = arduino

; --- Flashing over the USB-TTL serial bootloader (no ST-Link needed) --------
; The USB-TTL adapter on PA9/PA10 doubles as the flash link via the STM32's
; built-in UART bootloader. Sequence: set BOOT0=1, reset, upload, BOOT0=0, reset.
upload_protocol = serial
upload_port = COM5
debug_tool = stlink

; Serial monitor (the firmware's debug/echo, not the data link) -------------
monitor_speed = 115200

; U8g2 drives the SSD1306 over hardware I2C ---------------------------------
lib_deps =
    olikraus/U8g2 @ ^2.35.30

; --- Flash over USB-TTL serial (DFU/UART bootloader) instead of ST-Link -----
; upload_protocol = serial
; upload_port = COM3        ; the USB-TTL adapter's port
; Set BOOT0=1, reset, upload, then BOOT0=0 and reset to run.
